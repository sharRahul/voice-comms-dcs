name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      sign_artifacts:
        description: "Attempt Authenticode signing using repository secrets"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "config/**"
      - "dcs_scripts/**"
      - "build/**"
      - "docs/**"
      - "pyproject.toml"
      - "requirements.txt"
      - ".github/workflows/windows-installer.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "config/**"
      - "dcs_scripts/**"
      - "build/**"
      - "docs/**"
      - "pyproject.toml"
      - "requirements.txt"
      - ".github/workflows/windows-installer.yml"

permissions:
  contents: read

jobs:
  build-windows-installer:
    name: Build EXE and installer
    runs-on: windows-latest
    timeout-minutes: 60

    env:
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      VCDCS_SIGN_CERT_THUMBPRINT: ${{ secrets.VCDCS_SIGN_CERT_THUMBPRINT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe not found after Inno Setup installation: $iscc"
          }
          echo "INNO_SETUP_COMPILER=$iscc" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install Python build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Build PyInstaller executable
        shell: pwsh
        run: |
          .\build\build_exe.ps1
          if (-not (Test-Path "dist\Voice-Comms-DCS\Voice-Comms-DCS.exe")) {
            throw "PyInstaller output missing: dist\Voice-Comms-DCS\Voice-Comms-DCS.exe"
          }

      - name: Compile Inno Setup installer
        shell: pwsh
        run: |
          & "$env:INNO_SETUP_COMPILER" "build\voice-comms-dcs.iss"
          $installer = Get-ChildItem -Path build_output -Filter "Voice-Comms-DCS-Setup-*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "Installer output missing from build_output"
          }
          Write-Host "Installer built: $($installer.FullName)"

      - name: Generate checksum manifests
        shell: pwsh
        run: |
          python -m voice_comms_dcs.release_manifest --output build_output\release_manifest.json
          python -m voice_comms_dcs.release_manifest --output build_output\release_manifest.json --verify
          python -m voice_comms_dcs.model_manifest --output build_output\model_manifest.json
          python -m voice_comms_dcs.model_manifest --output build_output\model_manifest.json --verify

      - name: Optional Authenticode signing
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.sign_artifacts == 'true' }}
        shell: pwsh
        run: |
          if (-not $env:VCDCS_SIGN_CERT_THUMBPRINT) {
            throw "sign_artifacts=true was requested but VCDCS_SIGN_CERT_THUMBPRINT is not configured as a repository secret."
          }
          .\build\sign_release.ps1 -Manifest "build_output\release_manifest.json" -ModelManifest "build_output\model_manifest.json"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Voice-Comms-DCS-Windows-Installer
          path: |
            build_output/Voice-Comms-DCS-Setup-*.exe
            build_output/release_manifest.json
            build_output/release_manifest.json.sha256
            build_output/model_manifest.json
            build_output/model_manifest.json.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Upload portable EXE folder
        uses: actions/upload-artifact@v4
        with:
          name: Voice-Comms-DCS-Portable-Windows
          path: dist/Voice-Comms-DCS/**
          if-no-files-found: error
          retention-days: 30
