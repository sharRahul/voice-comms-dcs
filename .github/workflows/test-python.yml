name: Python tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-python:
    name: Python 3.11 tests and typing
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt -c constraints.txt
          python -m pip install -e . --no-deps

      - name: Register mypy problem matcher
        run: echo "::add-matcher::.github/problem-matchers/mypy.json"

      - name: Run pytest with coverage
        run: |
          python -m pytest tests/ \
            --cov=voice_comms_dcs.nimbus_intelligence \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=40

      - name: Run mypy
        run: |
          python -m mypy src/voice_comms_dcs/ \
            --python-version 3.11 \
            --ignore-missing-imports \
            --show-column-numbers \
            --show-error-codes
